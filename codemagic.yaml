workflows:
  ios-build:
    name: Build iOS IPA
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: v22
    scripts:
      - name: Update Node.js to v22
        script: |
          nvm install 22
          nvm use 22
      - name: Install dependencies
        script: |
          npm install
      - name: Build web project
        script: |
          npm run build
      - name: Capacitor sync
        script: |
          npx cap sync ios
      - name: Build iOS app
        script: |
          cd ios/App
          pod install
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release archive -archivePath App.xcarchive
          xcodebuild -exportArchive -archivePath App.xcarchive -exportOptionsPlist export_options.plist -exportPath .
    artifacts:
      - ios/App/*.ipa
